<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🪙 壓幣珍藏誌 - 暖咖米色手帳版</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="my-app-icon.png">
  <link rel="icon" type="image/png" href="my-app-icon.png">
  <meta name="theme-color" content="#7A5C43">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    @media (max-width: 380px) { .brand-title { font-size: 14px !important; } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #F4EFE6; }
    ::-webkit-scrollbar-thumb { background: #CDBFA8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #A8967E; }
  </style>
</head>
<body class="bg-[#F9F6F1] text-[#4A3E3D] font-['Noto_Sans_TC'] antialiased" x-data="coinApp()" x-init="init()">

  <div class="flex flex-col h-screen overflow-hidden">
    
    <header class="flex flex-wrap md:flex-nowrap justify-between items-center gap-3 px-3 md:px-6 py-2.5 bg-[#FCFAF7] shadow-sm border-b border-[#EFEBE4] shrink-0 z-40 w-full">
      <div class="flex items-center gap-1.5 min-w-0">
        <button 
          @click="isSidebarOpen = !isSidebarOpen" 
          class="md:hidden text-[#6E5A58] hover:text-[#7A5C43] p-2 bg-[#F4EFE6] hover:bg-[#EAE2D5] rounded-lg border border-[#E3DAC9] text-base shrink-0"
        >
          ☰
        </button>
        <h1 class="brand-title text-base md:text-xl font-bold flex items-center gap-1 truncate text-[#5C4636]">
          <span>🪙</span><span class="truncate tracking-wide">壓幣珍藏誌</span>
        </h1>
      </div>

      <div class="flex bg-[#F4EFE6] p-1 rounded-xl border border-[#E3DAC9] mx-auto md:mx-2 shadow-inner shrink-0">
        <button 
          @click="switchTab('press')" 
          :class="currentTab === 'press' ? 'bg-[#7A5C43] text-white shadow-sm' : 'text-[#6E5A58] hover:text-[#7A5C43]'"
          class="px-4 py-1.5 rounded-lg text-xs md:text-sm font-bold transition duration-200 flex items-center gap-1"
        >
          <span>🔨</span><span>壓幣</span>
        </button>
        <button 
          @click="switchTab('round')" 
          :class="currentTab === 'round' ? 'bg-[#7A5C43] text-white shadow-sm' : 'text-[#6E5A58] hover:text-[#7A5C43]'"
          class="px-4 py-1.5 rounded-lg text-xs md:text-sm font-bold transition duration-200 flex items-center gap-1"
        >
          <span>🟡</span><span>圓幣</span>
        </button>
      </div>
      
      <div class="flex items-center gap-1 shrink-0 ml-auto md:ml-0">
        <button @click="exportData()" class="bg-[#F4EFE6] hover:bg-[#EAE2D5] text-[#5C4636] text-xs p-2 rounded-lg font-medium transition border border-[#E3DAC9]" title="備份">📥</button>
        <button @click="$refs.importInput.click()" class="bg-[#F4EFE6] hover:bg-[#EAE2D5] text-[#5C4636] text-xs p-2 rounded-lg font-medium transition border border-[#E3DAC9]" title="還原">📤</button>
        <input type="file" x-ref="importInput" accept=".json" class="hidden" @change="importData($event)">

        <button @click="openAddModal()" class="bg-[#7A5C43] hover:bg-[#654C36] text-[#FCFAF7] px-3 py-2 rounded-lg font-medium shadow-sm transition flex items-center gap-0.5 text-xs md:text-sm">
          <span>➕</span><span>記錄</span>
        </button>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
      
      <div x-show="isSidebarOpen" x-cloak @click="isSidebarOpen = false" class="md:hidden fixed inset-0 bg-black/40 z-40"></div>

      <aside class="hidden md:flex w-64 bg-[#FCFAF7] border-r border-[#EFEBE4] p-4 flex-col gap-1 overflow-y-auto select-none z-20 shrink-0 h-full">
        <div class="flex justify-between items-center mb-3 px-2 h-8">
          <h2 class="text-xs font-bold text-[#A8967E] uppercase tracking-wider" x-text="currentTab === 'press' ? '壓幣分類快選' : '圓幣分類快選'"></h2>
          <button 
            @click="isEditMode = !isEditMode" 
            :class="isEditMode ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-[#F4EFE6] text-[#5C4636] hover:bg-[#EAE2D5] border-[#E3DAC9]'"
            class="text-xs px-2 py-1 rounded font-medium border transition flex items-center gap-1"
          >
            <span x-text="isEditMode ? '✅ 完成' : '⚙️ 整理'"></span>
          </button>
        </div>

        <div x-show="isEditMode" class="mb-2 px-1">
          <button @click="isCatModalOpen = true" class="w-full text-center text-xs bg-[#FDFBF7] hover:bg-[#F4EFE6] text-[#7A5C43] py-2 rounded-lg font-semibold transition border border-dashed border-[#CDBFA8]">
            ➕ 新增全新分類
          </button>
        </div>
        
        <button
          @click="if(!isEditMode) { setCategory('全部'); }"
          :class="getActiveCategory() === '全部' ? 'bg-[#EAE2D5] text-[#5C4636] font-bold shadow-xs' : 'text-[#6E5A58] hover:bg-[#F4EFE6]'"
          :disabled="isEditMode"
          class="w-full flex justify-between items-center px-3 py-2.5 rounded-lg text-sm font-medium transition mb-1 disabled:opacity-50"
        >
          <span class="flex items-center gap-2">🌍 全部收藏</span>
          <span class="text-xs px-2 py-0.5 rounded-full bg-[#F4EFE6] text-[#6E5A58]" x-text="getCurrentTabCoins().length"></span>
        </button>

        <div class="border-t my-1 border-[#EFEBE4]"></div>

        <template x-for="cat in getCurrentCategories()" :key="cat">
          <div 
            :class="getActiveCategory() === cat && !isEditMode ? 'bg-[#EAE2D5] text-[#5C4636] font-bold shadow-xs' : 'text-[#6E5A58] hover:bg-[#F4EFE6]'"
            class="w-full flex justify-between items-center px-3 py-2 rounded-lg text-sm font-medium transition h-10"
          >
            <button @click="if(!isEditMode) { setCategory(cat); }" :disabled="isEditMode" class="flex-1 text-left py-0.5 flex items-center gap-2 overflow-hidden disabled:cursor-default">
              <span class="truncate" x-text="'📁 ' + cat"></span>
            </button>
            <div class="flex items-center shrink-0">
              <span x-show="!isEditMode" class="text-xs px-1.5 py-0.5 rounded-full bg-[#F4EFE6] text-[#6E5A58]" x-text="getCategoryCount(cat)"></span>
              <div x-show="isEditMode" class="flex items-center gap-1">
                <button @click.stop="editCategoryPrompt(cat)" class="text-[#6E5A58] hover:text-[#7A5C43] text-xs px-1.5 py-1 bg-[#FDFBF7] hover:bg-[#F4EFE6] rounded border border-[#E3DAC9] transition">✏️</button>
                <button @click.stop="deleteCategory(cat)" class="text-[#6E5A58] hover:text-red-600 text-xs px-1.5 py-1 bg-[#FDFBF7] hover:bg-[#F4EFE6] rounded border border-[#E3DAC9] transition">❌</button>
              </div>
            </div>
          </div>
        </template>
      </aside>

      <aside x-show="isSidebarOpen" x-cloak class="md:hidden fixed top-0 bottom-0 left-0 w-64 bg-[#FCFAF7] border-r border-[#EFEBE4] p-4 flex flex-col gap-1 overflow-y-auto select-none z-50 h-full shadow-2xl">
        <div class="flex justify-between items-center mb-4 border-b border-[#EFEBE4] pb-2">
          <span class="font-bold text-[#5C4636]" x-text="currentTab === 'press' ? '📋 壓幣選單' : '📋 圓幣選單'"></span>
          <button @click="isSidebarOpen = false" class="text-gray-400 text-xl px-2">×</button>
        </div>

        <div class="flex justify-between items-center mb-3 px-2 h-8">
          <h2 class="text-xs font-bold text-[#A8967E] uppercase tracking-wider">分類快選</h2>
          <button 
            @click="isEditMode = !isEditMode" 
            :class="isEditMode ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-[#F4EFE6] text-[#5C4636] hover:bg-[#EAE2D5] border-[#E3DAC9]'"
            class="text-xs px-2 py-1 rounded font-medium border transition flex items-center gap-1"
          >
            <span x-text="isEditMode ? '✅ 完成' : '⚙️ 整理'"></span>
          </button>
        </div>

        <div x-show="isEditMode" class="mb-2 px-1">
          <button @click="isCatModalOpen = true" class="w-full text-center text-xs bg-[#FDFBF7] hover:bg-[#F4EFE6] text-[#7A5C43] py-2 rounded-lg font-semibold transition border border-dashed border-[#CDBFA8]">
            ➕ 新增全新分類
          </button>
        </div>
        
        <button
          @click="if(!isEditMode) { setCategory('全部'); isSidebarOpen = false; }"
          :class="getActiveCategory() === '全部' ? 'bg-[#EAE2D5] text-[#5C4636] font-bold shadow-xs' : 'text-[#6E5A58] hover:bg-[#F4EFE6]'"
          :disabled="isEditMode"
          class="w-full flex justify-between items-center px-3 py-2.5 rounded-lg text-sm font-medium transition mb-1 disabled:opacity-50"
        >
          <span class="flex items-center gap-2">🌍 全部收藏</span>
          <span class="text-xs px-2 py-0.5 rounded-full bg-[#F4EFE6] text-[#6E5A58]" x-text="getCurrentTabCoins().length"></span>
        </button>

        <div class="border-t my-1 border-[#EFEBE4]"></div>

        <template x-for="cat in getCurrentCategories()" :key="cat">
          <div 
            :class="getActiveCategory() === cat && !isEditMode ? 'bg-[#EAE2D5] text-[#5C4636] font-bold shadow-xs' : 'text-[#6E5A58] hover:bg-[#F4EFE6]'"
            class="w-full flex justify-between items-center px-3 py-2 rounded-lg text-sm font-medium transition h-10"
          >
            <button @click="if(!isEditMode) { setCategory(cat); isSidebarOpen = false; }" :disabled="isEditMode" class="flex-1 text-left py-0.5 flex items-center gap-2 overflow-hidden disabled:cursor-default">
              <span class="truncate" x-text="'📁 ' + cat"></span>
            </button>
            <div class="flex items-center shrink-0">
              <span x-show="!isEditMode" class="text-xs px-1.5 py-0.5 rounded-full bg-[#F4EFE6] text-[#6E5A58]" x-text="getCategoryCount(cat)"></span>
              <div x-show="isEditMode" class="flex items-center gap-1">
                <button @click.stop="editCategoryPrompt(cat)" class="text-[#6E5A58] hover:text-[#7A5C43] text-xs px-1.5 py-1 bg-[#FDFBF7] hover:bg-[#F4EFE6] rounded border border-[#E3DAC9] transition">✏️</button>
                <button @click.stop="deleteCategory(cat)" class="text-[#6E5A58] hover:text-red-600 text-xs px-1.5 py-1 bg-[#FDFBF7] hover:bg-[#F4EFE6] rounded border border-[#E3DAC9] transition">❌</button>
              </div>
            </div>
          </div>
        </template>
      </aside>

      <main class="flex-1 p-4 md:p-6 overflow-y-auto bg-[#F9F6F1] w-full">
        <div class="mb-4">
          <h2 class="text-xs md:text-sm font-bold text-[#A8967E] uppercase tracking-wider">
            目前瀏覽：<span class="text-[#7A5C43] font-bold" x-text="currentTab === 'press' ? '🔨 壓幣' : '🟡 圓幣'"></span> ➡️ <span class="text-[#7A5C43] font-extrabold" x-text="getActiveCategory()"></span>
          </h2>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <div x-show="filteredCoins().length === 0" class="col-span-full text-center py-12 text-[#A8967E] border-2 border-dashed border-[#CDBFA8] rounded-xl bg-[#FCFAF7] text-sm px-4">
            目前這個分類還沒有紀錄，點擊右上角按鈕開始記錄吧！
          </div>

          <template x-for="coin in filteredCoins()" :key="coin.id">
            <div 
              @click="openDetailModal(coin)"
              class="bg-[#FCFAF7] rounded-xl shadow-xs border border-[#EFEBE4] overflow-hidden hover:shadow-md hover:-translate-y-0.5 transition-all duration-300 relative group/card cursor-pointer"
            >
              <button @click.stop="deleteCoin(coin.id)" class="absolute top-2 right-2 bg-black/30 hover:bg-red-600 text-[#FCFAF7] w-7 h-7 md:w-6 md:h-6 rounded-full text-sm flex items-center justify-center md:opacity-0 group-hover/card:opacity-100 transition z-10 font-bold">×</button>
              <div class="h-44 md:h-48 bg-[#EAE2D5] flex items-center justify-center overflow-hidden border-b border-[#EFEBE4]">
                <template x-if="coin.image"><img :src="coin.image" class="w-full h-full object-cover"></template>
                <template x-if="!coin.image"><span class="text-[#A8967E] text-sm">📷 無照片</span></template>
              </div>
              <div class="p-3.5 flex flex-col gap-1">
                <div class="flex justify-between items-start gap-2">
                  <h3 class="font-bold text-[#4A3E3D] text-sm md:text-base truncate" x-text="coin.title"></h3>
                  <span class="text-[10px] bg-[#F4EFE6] text-[#7A5C43] border border-[#E3DAC9] px-1.5 py-0.5 rounded shrink-0 font-semibold" x-text="coin.category"></span>
                </div>
                <p class="text-xs text-[#6E5A58] truncate flex items-center gap-1"><span>📍</span> <span x-text="coin.location"></span></p>
                <p class="text-[11px] text-[#A8967E] truncate italic" x-text="coin.notes ? '💬 ' + coin.notes : '無備註'"></p>
              </div>
            </div>
          </template>
        </div>
      </main>
    </div>

    <div x-show="isOpen" x-cloak class="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center z-50 p-4" @keyup.escape.window="isOpen = false">
      <div class="bg-[#FCFAF7] rounded-xl shadow-xl w-full max-w-md overflow-hidden border border-[#EFEBE4]" @click.away="isOpen = false">
        <div class="px-5 py-3.5 border-b border-[#EFEBE4] flex justify-between items-center bg-[#F4EFE6]">
          <h3 class="font-bold text-[#5C4636] text-sm" x-text="currentTab === 'press' ? '記錄我的全新壓幣' : '記錄我的全新圓幣'"></h3>
          <button type="button" @click="isOpen = false" class="text-gray-400 hover:text-gray-600 text-xl">×</button>
        </div>
        <form class="p-4 md:p-6 flex flex-col gap-3 md:gap-4 overflow-y-auto max-h-[calc(100vh-8rem)]" @submit.prevent="saveCoin()">
          <div>
            <label class="block text-xs font-semibold text-[#6E5A58] mb-1">收藏標題</label>
            <input type="text" required x-model="form.title" :placeholder="currentTab === 'press' ? '例如：東京迪士尼樂園米奇限定壓幣' : '例如：富士山登頂紀念金幣'" class="w-full border border-[#E3DAC9] rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#7A5C43]" />
          </div>
          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-xs font-semibold text-[#6E5A58]">選擇分類</label>
              <button type="button" @click="isNewCat = !isNewCat" class="text-xs text-[#7A5C43] hover:text-[#654C36] font-medium" x-text="isNewCat ? '⬅️ 選取現有' : '➕ 新增分類'"></button>
            </div>
            <div x-show="isNewCat"><input type="text" x-model="form.newCategory" :required="isNewCat" placeholder="請輸入新分類名稱" class="w-full border border-[#E3DAC9] rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#7A5C43]" /></div>
            <div x-show="!isNewCat">
              <select x-model="form.category" class="w-full border border-[#E3DAC9] rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#7A5C43]">
                <template x-for="cat in getCurrentCategories()"><option :value="cat" x-text="cat"></option></template>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-[#6E5A58] mb-1">在哪裡獲得的？</label>
            <input type="text" required x-model="form.location" placeholder="例如：日本千葉縣迪士尼樂園" class="w-full border border-[#E3DAC9] rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#7A5C43]" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-[#6E5A58] mb-1">新增備註（選填）</label>
            <textarea x-model="form.notes" rows="2" placeholder="寫下具體機台的位置或當時心情..." class="w-full border border-[#E3DAC9] rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#7A5C43]"></textarea>
          </div>
          <div class="bg-[#F4EFE6] p-3 rounded-lg border border-[#E3DAC9]">
            <label class="block text-xs font-bold text-[#5C4636] mb-1.5 flex justify-between"><span>上傳照片</span><span class="text-xs text-indigo-700 font-normal" x-text="compressStatus"></span></label>
            <input type="file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-[#7A5C43] file:text-white file:cursor-pointer hover:file:bg-[#654C36]" @change="handleImageUpload($event, 'form')" />
            <div x-show="form.image" class="mt-3 flex justify
