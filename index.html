<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪙 壓幣珍藏誌 - 分類直覺管理版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans" x-data="coinApp()" x-init="init()">

  <div class="flex flex-col h-screen">
    
    <header class="flex justify-between items-center px-6 py-4 bg-white shadow-sm border-b">
      <h1 class="text-xl font-bold flex items-center gap-2">
        <span>🪙</span> 壓幣珍藏誌 Coin Collector
      </h1>
      <button 
        @click="openAddModal()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition flex items-center gap-1"
      >
        <span>➕</span> 記錄新壓幣
      </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
      
      <aside class="w-72 bg-white border-r p-4 flex flex-col gap-1 overflow-y-auto">
        <div class="flex justify-between items-center mb-3 px-2">
          <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider">分類管理</h2>
          <button @click="isCatModalOpen = true" class="text-xs bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-2 py-1 rounded font-medium transition">
            ➕ 新增分類
          </button>
        </div>
        
        <button
          @click="selectedCategory = '全部'"
          :class="selectedCategory === '全部' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-600 hover:bg-gray-100'"
          class="w-full flex justify-between items-center px-3 py-2.5 rounded-lg text-sm font-medium transition mb-2"
        >
          <span class="flex items-center gap-2">🌍 全部收藏</span>
          <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500" x-text="coins.length"></span>
        </button>

        <div class="border-t my-2 border-gray-100"></div>

        <template x-for="cat in categories" :key="cat">
          <div 
            :class="selectedCategory === cat ? 'bg-indigo-50 text-indigo-700' : 'text-gray-600 hover:bg-gray-50'"
            class="w-full flex justify-between items-center px-3 py-2 rounded-lg text-sm font-medium transition"
          >
            <button @click="selectedCategory = cat" class="flex-1 text-left py-0.5 flex items-center gap-2 overflow-hidden">
              <span class="truncate" x-text="'📁 ' + cat"></span>
            </button>
            
            <div class="flex items-center gap-1 shrink-0">
              <span class="text-xs px-1.5 py-0.5 rounded-full bg-gray-100 text-gray-500 mr-1" x-text="getCategoryCount(cat)"></span>
              
              <button @click.stop="editCategoryPrompt(cat)" class="text-gray-400 hover:text-indigo-600 text-xs p-1 bg-gray-50 hover:bg-gray-100 rounded border border-gray-200" title="修改名稱">✏️</button>
              <button @click.stop="deleteCategory(cat)" class="text-gray-400 hover:text-red-600 text-xs p-1 bg-gray-50 hover:bg-gray-100 rounded border border-gray-200" title="刪除分類">❌</button>
            </div>
          </div>
        </template>
      </aside>

      <main class="flex-1 p-6 overflow-y-auto bg-gray-100">
        <div class="mb-6">
          <h2 class="text-lg font-semibold text-gray-700">
            目前瀏覽分類：<span class="text-indigo-600" x-text="selectedCategory"></span>
          </h2>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div x-show="filteredCoins().length === 0" class="col-span-full text-center py-12 text-gray-400 border-2 border-dashed border-gray-300 rounded-xl bg-white">
            目前這個分類還沒有壓幣，點擊右上角按鈕開始記錄吧！
          </div>

          <template x-for="coin in filteredCoins()" :key="coin.id">
            <div 
              @click="openDetailModal(coin)"
              class="bg-white rounded-xl shadow-sm border overflow-hidden hover:shadow-md transition relative group/card cursor-pointer"
            >
              <button @click.stop="deleteCoin(coin.id)" class="absolute top-2 right-2 bg-black/50 hover:bg-red-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center opacity-0 group-hover/card:opacity-100 transition z-10">×</button>
              
              <div class="h-48 bg-gray-200 flex items-center justify-center overflow-hidden border-b">
                <template x-if="coin.image">
                  <img :src="coin.image" class="w-full h-full object-cover">
                </template>
                <template x-if="!coin.image">
                  <span class="text-gray-400 text-sm">📷 無照片</span>
                </template>
              </div>
              <div class="p-4 flex flex-col gap-1.5">
                <div class="flex justify-between items-start gap-2">
                  <h3 class="font-bold text-gray-800 text-base truncate" x-text="coin.title"></h3>
                  <span class="text-xs bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded-full shrink-0" x-text="coin.category"></span>
                </div>
                <p class="text-sm text-gray-500 truncate flex items-center gap-1">
                  <span>📍</span> <span x-text="coin.location"></span>
                </p>
                <p class="text-xs text-gray-400 truncate italic" x-text="coin.notes ? '💬 ' + coin.notes : '無備註'"></p>
              </div>
            </div>
          </template>
        </div>
      </main>
    </div>

    <div x-show="isOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" style="display: none;">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden" @click.away="isOpen = false">
        <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50">
          <h3 class="font-bold text-gray-700">記錄我的全新壓幣</h3>
          <button @click="isOpen = false" class="text-gray-400 hover:text-gray-600 text-xl">×</button>
        </div>
        
        <form class="p-6 flex flex-col gap-4" @submit.prevent="saveCoin()">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">壓幣標題</label>
            <input type="text" required x-model="form.title" placeholder="例如：東京迪士尼樂園米奇限定款" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-sm font-medium text-gray-600">選擇分類</label>
              <button type="button" @click="isNewCat = !isNewCat" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium" x-text="isNewCat ? '⬅️ 選取現有分類' : '➕ 自訂新分類'"></button>
            </div>
            <div x-show="isNewCat">
              <input type="text" x-model="form.newCategory" :required="isNewCat" placeholder="請輸入新分類名稱" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div x-show="!isNewCat">
              <select x-model="form.category" class="w-full border rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <template x-for="cat in categories" :key="cat">
                  <option :value="cat" x-text="cat"></option>
                </template>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">在哪裡壓的？（記錄地點）</label>
            <input type="text" required x-model="form.location" placeholder="例如：日本千葉縣迪士尼樂園" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">新增備註（選填）</label>
            <textarea x-model="form.notes" rows="2" placeholder="寫下當時的心情或機台的具體位置..." class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">上傳壓幣照片</label>
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-indigo-500 transition cursor-pointer bg-gray-50 relative">
              <input type="file" accept="image/*" class="hidden" id="coin-upload" @change="handleImageUpload($event)" />
              <label htmlFor="coin-upload" class="cursor-pointer text-sm text-gray-500 flex flex-col items-center gap-1">
                <span x-show="!form.image">📸 點擊這裡選擇照片</span>
                <img x-show="form.image" :src="form.image" class="max-h-32 object-contain rounded-md shadow-sm">
                <span x-show="form.image" class="text-xs text-indigo-500 underline mt-1">更換照片</span>
              </label>
            </div>
          </div>

          <div class="flex gap-3 justify-end mt-2">
            <button type="button" @click="isOpen = false" class="px-4 py-2 border rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">取消</button>
            <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium shadow-sm">確認儲存</button>
          </div>
        </form>
      </div>
    </div>

    <div x-show="isDetailOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" style="display: none;">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden" @click.away="isDetailOpen = false">
        
        <div class="h-64 bg-gray-900 flex items-center justify-center relative">
          <template x-if="detailCoin.image">
            <img :src="detailCoin.image" class="w-full h-full object-contain">
          </template>
          <template x-if="!detailCoin.image">
            <span class="text-gray-500 text-lg">📷 尚無照片</span>
          </template>
          <button @click="isDetailOpen = false" class="absolute top-3 right-3 bg-black/60 text-white w-8 h-8 rounded-full flex items-center justify-center text-xl hover:bg-black/80">×</button>
        </div>

        <div class="p-6 flex flex-col gap-4">
          <div class="flex justify-between items-center">
            <h3 class="text-xl font-bold text-gray-800" x-text="detailCoin.title"></h3>
            <span class="text-xs bg-indigo-100 text-indigo-800 px-2.5 py-1 rounded-full font-semibold" x-text="detailCoin.category"></span>
          </div>

          <div class="bg-gray-50 p-3 rounded-lg border flex flex-col gap-1">
            <span class="text-xs font-bold text-gray-400">收藏地點</span>
            <div class="flex justify-between items-center">
              <span class="text-sm font-medium text-gray-700" x-text="detailCoin.location"></span>
              <a 
                :href="'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(detailCoin.location)" 
                target="_blank"
                class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-2.5 py-1.5 rounded font-medium flex items-center gap-1 shrink-0 transition"
              >
                🗺️ 地圖查看
              </a>
            </div>
          </div>

          <div class="flex flex-col gap-1">
            <span class="text-xs font-bold text-gray-400">旅人備註</span>
            <textarea 
              x-model="detailCoin.notes" 
              @input="updateCoinNotes(detailCoin.id, detailCoin.notes)"
              rows="3" 
              placeholder="點擊這裡可以隨時修改或新增備註..." 
              class="w-full border rounded-lg px-3 py-2 text-sm bg-indigo-50/30 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            ></textarea>
          </div>

          <div class="border-t pt-3 flex justify-between items-center text-xs text-gray-400">
            <span x-text="'記錄日期：' + detailCoin.date"></span>
            <button @click="isDetailOpen = false" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-1.5 rounded-lg font-medium transition">關閉</button>
          </div>
        </div>

      </div>
    </div>

    <div x-show="isCatModalOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] p-4" style="display: none;">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden" @click.away="isCatModalOpen = false">
        <div class="px-5 py-3 border-b flex justify-between items-center bg-gray-50">
          <h3 class="font-bold text-gray-700 text-sm">➕ 建立新分類</h3>
          <button @click="isCatModalOpen = false" class="text-gray-400 hover:text-gray-600 text-lg">×</button>
        </div>
        <div class="p-5 flex flex-col gap-3">
          <input 
            type="text" x-model="newCatInput" placeholder="例如：鐵道系列、歐洲行" 
            class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
            @keyup.enter="addNewCategory()"
          />
          <div class="flex justify-end gap-2 text-sm">
            <button @click="isCatModalOpen = false" class="px-3 py-1.5 border rounded text-gray-500 hover:bg-gray-50">取消</button>
            <button @click="addNewCategory()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded shadow-sm font-medium">確認新增</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    function coinApp() {
      return {
        isOpen: false,
        isNewCat: false,
        isDetailOpen: false,
        isCatModalOpen: false, // 控制新增分類的小視窗
        newCatInput: '',       // 新增分類輸入框狀態
        selectedCategory: '全部',
        categories: [],
        coins: [],
        form: { title: '', category: '', newCategory: '', location: '', notes: '', image: '' },
        detailCoin: { id: '', title: '', category: '', location: '', notes: '', date: '', image: '' },

        init() {
          // 讀取既有或給予預設
          const savedCategories = localStorage.getItem('coin_categories');
          const savedCoins = localStorage.getItem('coin_data');
          
          this.categories = savedCategories ? JSON.parse(savedCategories) : ['台灣', '日本', '遊樂園', '博物館'];
          this.coins = savedCoins ? JSON.parse(savedCoins) : [];
          
          if (!Array.isArray(this.categories) || this.categories.length === 0) {
            this.categories = ['台灣', '日本', '遊樂園', '博物館'];
          }
          this.form.category = this.categories[0];
          this.saveToStorage();
        },

        saveToStorage() {
          localStorage.setItem('coin_categories', JSON.stringify(this.categories));
          localStorage.setItem('coin_data', JSON.stringify(this.coins));
        },

        // 正式新增左側分類
        addNewCategory() {
          if (this.newCatInput && this.newCatInput.trim()) {
            const name = this.newCatInput.trim();
            if (!this.categories.includes(name)) {
              this.categories.push(name);
              this.saveToStorage();
              this.newCatInput = '';
              this.isCatModalOpen = false;
            } else { alert("這個分類已經存在囉！"); }
          }
        },

        openDetailModal(coin) {
          this.detailCoin = { ...coin };
          this.isDetailOpen = true;
        },

        updateCoinNotes(id, newNotes) {
          const coin = this.coins.find(c => c.id === id);
          if (coin) {
            coin.notes = newNotes;
            this.saveToStorage();
          }
        },

        openAddModal() {
          this.form.category = this.categories[0] || '台灣';
          this.isOpen = true;
        },

        editCategoryPrompt(oldName) {
          const newName = prompt(`要把「${oldName}」分類修改為什麼名稱？`, oldName);
          if (newName && newName.trim() && newName.trim() !== oldName) {
            const trimmed = newName.trim();
            const index = this.categories.indexOf(oldName);
            if (index !== -1) this.categories[index] = trimmed;
            this.coins.forEach(coin => { if (coin.category === oldName) coin.category = trimmed; });
            if (this.selectedCategory === oldName) this.selectedCategory = trimmed;
            this.saveToStorage();
          }
        },

        deleteCategory(catName) {
          const coinCount = this.getCategoryCount(catName);
          let confirmMsg = `確定要刪除「${catName}」分類嗎？`;
          if (coinCount > 0) confirmMsg = `「${catName}」分類下還有 ${coinCount} 個壓幣，刪除後將歸為「未分類」。確定刪除？`;
          
          if (confirm(confirmMsg)) {
            this.categories = this.categories.filter(c => c !== catName);
            this.coins.forEach(coin => { if (coin.category === catName) coin.category = '未分類'; });
            if (coinCount > 0 && !this.categories.includes('未分類')) this.categories.push('未分類');
            if (this.selectedCategory === catName) this.selectedCategory = '全部';
            this.saveToStorage();
          }
        },

        deleteCoin(id) {
          if (confirm("確定要刪除這枚壓幣的收藏紀錄嗎？")) {
            this.coins = this.coins.filter(c => c.id !== id);
            this.saveToStorage();
            this.isDetailOpen = false;
          }
        },

        handleImageUpload(event) {
          const file = event.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { this.form.image = e.target.result; };
            reader.readAsDataURL(file);
          }
        },

        getCategoryCount(category) {
          return this.coins.filter(c => c.category === category).length;
        },

        filteredCoins() {
          if (this.selectedCategory === '全部') return this.coins;
          return this.coins.filter(c => c.category === this.selectedCategory);
        },

        saveCoin() {
          const finalCategory = this.isNewCat ? this.form.newCategory : this.form.category;
          if (this.isNewCat && this.form.newCategory && !this.categories.includes(this.form.newCategory)) {
            this.categories.push(this.form.newCategory);
          }

          this.coins.push({
            id: Date.now(),
            title: this.form.title,
            category: finalCategory,
            location: this.form.location,
            notes: this.form.notes || '',
            date: new Date().toISOString().split('T')[0],
            image: this.form.image
          });

          this.saveToStorage();
          this.isOpen = false;
          this.isNewCat = false;
          this.form = { title: '', category: this.categories[0] || '台灣', newCategory: '', location: '', notes: '', image: '' };
        }
      }
    }
  </script>
</body>
</html>
