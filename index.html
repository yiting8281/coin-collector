<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪙 壓幣珍藏誌 - 原型測試</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans" x-data="coinApp()">

  <div class="flex flex-col h-screen">
    
    <header class="flex justify-between items-center px-6 py-4 bg-white shadow-sm border-b">
      <h1 class="text-xl font-bold flex items-center gap-2">
        <span>🪙</span> 壓幣珍藏誌 Coin Collector
      </h1>
      <button 
        @click="isOpen = true"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition flex items-center gap-1"
      >
        <span>➕</span> 記錄新壓幣
      </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
      
      <aside class="w-64 bg-white border-r p-4 flex flex-col gap-1">
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-2 mb-2">
          分類快選
        </h2>
        
        <button
          @click="selectedCategory = '全部'"
          :class="selectedCategory === '全部' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-600 hover:bg-gray-100'"
          class="w-full flex justify-between items-center px-3 py-2.5 rounded-lg text-sm font-medium transition"
        >
          <span class="flex items-center gap-2">🌍 全部收藏</span>
          <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500" x-text="coins.length"></span>
        </button>

        <template x-for="cat in categories" :key="cat">
          <button
            @click="selectedCategory = cat"
            :class="selectedCategory === cat ? 'bg-indigo-50 text-indigo-700' : 'text-gray-600 hover:bg-gray-100'"
            class="w-full flex justify-between items-center px-3 py-2.5 rounded-lg text-sm font-medium transition"
          >
            <span class="flex items-center gap-2" x-text="'📁 ' + cat"></span>
            <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500" x-text="getCategoryCount(cat)"></span>
          </button>
        </template>
      </aside>

      <main class="flex-1 p-6 overflow-y-auto bg-gray-100">
        <div class="mb-6">
          <h2 class="text-lg font-semibold text-gray-700">
            目前瀏覽分類：<span class="text-indigo-600" x-text="selectedCategory"></span>
          </h2>
        </div>
        
        <div class="grid grid-cols-1 md-cols-2 lg:grid-cols-3 gap-6">
          
          <div x-show="filteredCoins().length === 0" class="col-span-full text-center py-12 text-gray-400 border-2 border-dashed border-gray-300 rounded-xl bg-white">
            目前這個分類還沒有壓幣，點擊右上角「記錄新壓幣」開始吧！
          </div>

          <template x-for="coin in filteredCoins()" :key="coin.id">
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden hover:shadow-md transition">
              <div class="h-48 bg-gray-200 flex items-center justify-center overflow-hidden border-b">
                <template x-if="coin.image">
                  <img :src="coin.image" class="w-full h-full object-cover">
                </template>
                <template x-if="!coin.image">
                  <span class="text-gray-400 text-sm">📷 無照片</span>
                </template>
              </div>
              <div class="p-4 flex flex-col gap-2">
                <div class="flex justify-between items-start">
                  <h3 class="font-bold text-gray-800 text-base" x-text="coin.title"></h3>
                  <span class="text-xs bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded-full" x-text="coin.category"></span>
                </div>
                <p class="text-sm text-gray-500 flex items-center gap-1">
                  <span>📍 地點：</span>
                  <span x-text="coin.location"></span>
                </p>
                <p class="text-xs text-gray-400 text-right" x-text="'記錄時間：' + coin.date"></p>
              </div>
            </div>
          </template>

        </div>
      </main>
    </div>

    <div 
      x-show="isOpen" 
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
      style="display: none;"
    >
      <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden" @click.away="isOpen = false">
        <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50">
          <h3 class="font-bold text-gray-700">記錄我的全新壓幣</h3>
          <button @click="isOpen = false" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        
        <form class="p-6 flex flex-col gap-4" @submit.prevent="saveCoin()">
          
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">壓幣標題</label>
            <input 
              type="text" required x-model="form.title"
              placeholder="例如：金瓜石黃金博物館-礦工款" 
              class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" 
            />
          </div>

          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-sm font-medium text-gray-600">選擇分類</label>
              <button 
                type="button" @click="isNewCat = !isNewCat"
                class="text-xs text-indigo-600 hover:text-indigo-800 font-medium"
                x-text="isNewCat ? '⬅️ 選取現有分類' : '➕ 自訂新分類'"
              ></button>
            </div>

            <div x-show="isNewCat">
              <input 
                type="text" x-model="form.newCategory" :required="isNewCat"
                placeholder="請輸入新分類名稱 (例如: 迪士尼)" 
                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              />
            </div>
            <div x-show="!isNewCat">
              <select 
                x-model="form.category"
                class="w-full border rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500"
              >
                <template x-for="cat in categories" :key="cat">
                  <option :value="cat" x-text="cat"></option>
                </template>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">在哪裡壓的？（記錄地點）</label>
            <input 
              type="text" required x-model="form.location"
              placeholder="例如：新北市瑞芳區黃金博物館 2F 機台" 
              class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" 
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">上傳壓幣照片</label>
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-indigo-500 transition cursor-pointer bg-gray-50 relative">
              <input 
                type="file" accept="image/*" class="hidden" id="coin-upload"
                @change="handleImageUpload($event)"
              />
              <label htmlFor="coin-upload" class="cursor-pointer text-sm text-gray-500 flex flex-col items-center gap-1">
                <span x-show="!form.image">📸 點擊這裡選擇照片</span>
                <img x-show="form.image" :src="form.image" class="max-h-32 object-contain rounded-md shadow-sm">
                <span x-show="form.image" class="text-xs text-indigo-500 underline mt-1">更換照片</span>
              </label>
            </div>
          </div>

          <div class="flex gap-3 justify-end mt-2">
            <button type="button" @click="isOpen = false" class="px-4 py-2 border rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">
              取消
            </button>
            <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium shadow-sm">
              確認儲存
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script>
    function coinApp() {
      return {
        isOpen: false,
        isNewCat: false,
        selectedCategory: '全部',
        
        // 預設分類
        categories: ['台灣', '日本', '遊樂園', '博物館'],
        
        // 預設兩筆測試資料，讓你一打開網頁就有東西看
        coins: [
          { id: 1, title: '黃金博物館礦工款', category: '台灣', location: '新北市瑞芳區黃金博物館', date: '2026-03-15', image: '' },
          { id: 2, title: '東京迪士尼樂園米奇', category: '遊樂園', location: '日本千葉縣迪士尼樂園', date: '2026-05-20', image: '' }
        ],
        
        // 表單暫存資料
        form: {
          title: '',
          category: '台灣',
          newCategory: '',
          location: '',
          image: ''
        },

        // 處理照片預覽
        handleImageUpload(event) {
          const file = event.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
              this.form.image = e.target.result; // 將圖片轉成 Base64 碼用來預覽
            };
            reader.readAsDataURL(file);
          }
        },

        // 計算每個分類有幾枚壓幣
        getCategoryCount(category) {
          return this.coins.filter(c => c.category === category).length;
        },

        // 根據左側選單動態篩選右側卡片
        filteredCoins() {
          if (this.selectedCategory === '全部') {
            return this.coins;
          }
          return this.coins.filter(c => c.category === this.selectedCategory);
        },

        // 儲存壓幣
        saveCoin() {
          const finalCategory = this.isNewCat ? this.form.newCategory : this.form.category;
          
          // 如果是新分類，推入分類選單
          if (this.isNewCat && this.form.newCategory && !this.categories.includes(this.form.newCategory)) {
            this.categories.push(this.form.newCategory);
          }

          // 新增一筆資料
          this.coins.push({
            id: Date.now(),
            title: this.form.title,
            category: finalCategory,
            location: this.form.location,
            date: new Date().toISOString().split('T')[0],
            image: this.form.image
          });

          // 重置表單與視窗
          this.isOpen = false;
          this.isNewCat = false;
          this.form = { title: '', category: '台灣', newCategory: '', location: '', image: '' };
        }
      }
    }
  </script>
</body>
</html>
