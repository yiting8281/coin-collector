<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪙 壓幣珍藏誌 - 修復穩定版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans" x-data="coinApp()" x-init="init()">

  <div class="flex flex-col h-screen">
    
    <header class="flex justify-between items-center px-6 py-4 bg-white shadow-sm border-b">
      <h1 class="text-xl font-bold flex items-center gap-2">
        <span>🪙</span> 壓幣珍藏誌 Coin Collector
      </h1>
      <button 
        @click="openAddModal()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition flex items-center gap-1"
      >
        <span>➕</span> 記錄新壓幣
      </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
      
      <aside class="w-72 bg-white border-r p-4 flex flex-col gap-1 overflow-y-auto">
        <div class="flex justify-between items-center mb-2 px-2">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">分類管理</h2>
          <button @click="addCategoryPrompt()" class="text-xs text-indigo-600 hover:underline font-medium">➕ 新增分類</button>
        </div>
        
        <button
          @click="selectedCategory = '全部'"
          :class="selectedCategory === '全部' ? 'bg-indigo-50 text-indigo-700' : 'text-gray-600 hover:bg-gray-100'"
          class="w-full flex justify-between items-center px-3 py-2.5 rounded-lg text-sm font-medium transition"
        >
          <span class="flex items-center gap-2">🌍 全部收藏</span>
          <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500" x-text="coins.length"></span>
        </button>

        <template x-for="cat in categories" :key="cat">
          <div 
            :class="selectedCategory === cat ? 'bg-indigo-50/50 text-indigo-700' : 'text-gray-600 hover:bg-gray-50'"
            class="group w-full flex justify-between items-center px-3 py-1.5 rounded-lg text-sm font-medium transition"
          >
            <button @click="selectedCategory = cat" class="flex-1 text-left py-1 flex items-center gap-2 overflow-hidden">
              <span class="truncate" x-text="'📁 ' + cat"></span>
            </button>
            <div class="flex items-center gap-1.5">
              <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 group-hover:hidden" x-text="getCategoryCount(cat)"></span>
              <button @click.stop="editCategoryPrompt(cat)" class="hidden group-hover:inline text-gray-400 hover:text-indigo-600 text-xs p-1">✏️</button>
              <button @click.stop="deleteCategory(cat)" class="hidden group-hover:inline text-gray-400 hover:text-red-600 text-xs p-1">❌</button>
            </div>
          </div>
        </template>
      </aside>

      <main class="flex-1 p-6 overflow-y-auto bg-gray-100">
        <div class="mb-6">
          <h2 class="text-lg font-semibold text-gray-700">
            目前瀏覽分類：<span class="text-indigo-600" x-text="selectedCategory"></span>
          </h2>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div x-show="filteredCoins().length === 0" class="col-span-full text-center py-12 text-gray-400 border-2 border-dashed border-gray-300 rounded-xl bg-white">
            目前這個分類還沒有壓幣！
          </div>

          <template x-for="coin in filteredCoins()" :key="coin.id">
            <div 
              @click="openDetailModal(coin)"
              class="bg-white rounded-xl shadow-sm border overflow-hidden hover:shadow-md transition relative group/card cursor-pointer"
            >
              <button @click.stop="deleteCoin(coin.id)" class="absolute top-2 right-2 bg-black/50 hover:bg-red-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center opacity-0 group-hover/card:opacity-100 transition z-10">×</button>
              
              <div class="h-48 bg-gray-200 flex items-center justify-center overflow-hidden border-b">
                <template x-if="coin.image">
                  <img :src="coin.image" class="w-full h-full object-cover">
                </template>
                <template x-if="!coin.image">
                  <span class="text-gray-400 text-sm">📷 無照片</span>
                </template>
              </div>
              <div class="p-4 flex flex-col gap-1.5">
                <div class="flex justify-between items-start gap-2">
                  <h3 class="font-bold text-gray-800 text-base truncate" x-text="coin.title"></h3>
                  <span class="text-xs bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded-full shrink-0" x-text="coin.category"></span>
                </div>
                <p class="text-sm text-gray-500 truncate flex items-center gap-1">
                  <span>📍</span> <span x-text="coin.location"></span>
                </p>
                <p class="text-xs text-gray-400 truncate italic" x-text="coin.notes ?
